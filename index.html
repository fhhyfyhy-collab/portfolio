<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卢发达 · 作品集</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
  background: #f5f6fa;
  color: #1a1a2e;
}
.header {
  background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  color: #fff;
  padding: 48px 24px 36px;
  text-align: center;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom:0; left:0; right:0;
  height:4px;
  background: linear-gradient(90deg,#e94560,#f5a623,#e94560);
}
.header h1 { font-size:32px; font-weight:700; letter-spacing:3px; margin-bottom:6px; }
.header .sub { font-size:15px; color:rgba(255,255,255,.7); letter-spacing:2px; }
.header .desc { font-size:14px; color:rgba(255,255,255,.6); margin-top:8px; max-width:600px; margin-left:auto; margin-right:auto; line-height:1.6; }

/* ===== NAV ===== */
.nav-bar {
  display: flex; justify-content: center; gap: 0;
  padding: 20px 16px;
  background: #fff;
  border-bottom: 1px solid #eee;
  position: sticky; top: 0; z-index: 10;
  flex-wrap: wrap;
}
.nav-btn {
  padding: 8px 28px;
  border: 1px solid #ddd;
  background: #fff;
  font-size: 14px;
  color: #666;
  cursor: pointer;
  transition: all .2s;
  font-weight: 500;
}
.nav-btn:first-child { border-radius: 20px 0 0 20px; border-right: none; }
.nav-btn:last-child { border-radius: 0 20px 20px 0; }
.nav-btn:hover { color: #e94560; }
.nav-btn.active { color: #fff; }

/* Tab 专属配色 */
.nav-btn[data-tab="projects"].active { background: #e94560; border-color: #e94560; }
.nav-btn[data-tab="albums"].active { background: #6c5ce7; border-color: #6c5ce7; }
.nav-btn[data-tab="exhibition"].active { background: #00b4d8; border-color: #00b4d8; color: #fff; }

.stats {
  text-align: center;
  font-size: 13px;
  color: #999;
  padding: 0 16px 16px;
  background: #fff;
  border-bottom: 1px solid #eee;
}

/* ===== PROJECT GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}
.card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  transition: transform .25s, box-shadow .25s;
  cursor: pointer;
  position: relative;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
.card-img { width:100%; height:200px; object-fit:cover; background:#eef1f7; display:block; }
.card-body { padding: 14px 16px 16px; }
.card-title { font-size:15px; font-weight:600; color:#1a1a2e; margin-bottom:6px; line-height:1.4; }
.card-meta { font-size:12px; color:#999; margin-bottom:8px; }
.card-meta span { margin-right:12px; }
.card-desc { font-size:12.5px; color:#666; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

/* ===== 展厅卡片 差异化配色 ===== */
.exhibition-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}
.exhibition-card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  transition: transform .25s, box-shadow .25s;
  cursor: pointer;
  position: relative;
  border-left: 3px solid #00b4d8;
}
.exhibition-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,182,216,.2); }
.exhibition-card .card-img { height:200px; object-fit:cover; background:#eef1f7; display:block; width:100%; }
.exhibition-card .card-body { padding: 14px 16px 16px; }
.exhibition-card .card-title { font-size:15px; font-weight:600; color:#1a1a2e; margin-bottom:6px; line-height:1.4; }
.exhibition-card .card-title::before { content: "\1f3e2 "; }
.exhibition-card .card-meta { font-size:12px; color:#999; margin-bottom:8px; }
.exhibition-card .card-meta span { margin-right:12px; }
.exhibition-card .card-desc { font-size:12.5px; color:#666; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

/* 展厅标签角标 */
.exhibition-badge {
  position: absolute;
  top: 10px; left: 10px;
  background: #00b4d8;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 4px;
  letter-spacing: 1px;
  z-index: 2;
  box-shadow: 0 2px 6px rgba(0,180,216,.4);
}
.exhibition-badge.status-done { background: #2ec4b6; }
.exhibition-badge.status-pending { background: #ff9f43; }

/* ===== ALBUM GRID ===== */
.album-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}
.album-card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  transition: transform .25s, box-shadow .25s;
  text-decoration: none;
  color: inherit;
  display: block;
}
.album-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
.album-img { width:100%; height:180px; object-fit:cover; background:#eef1f7; display:block; }
.album-placeholder { width:100%; height:180px; display:flex; align-items:center; justify-content:center; background:#eef1f7; font-size:48px; }
.album-body { padding:12px 14px 14px; }
.album-name { font-size:14px; font-weight:600; color:#1a1a2e; margin-bottom:4px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.album-meta { font-size:12px; color:#999; }
.album-meta span { margin-right:8px; }

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset:0;
  background: rgba(0,0,0,.6);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 12px;
  width: 100%;
  max-width: 680px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
  position: relative;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity:0; transform:scale(.95) } to { opacity:1; transform:scale(1) } }
.modal-close {
  position: absolute;
  top: 12px; right: 16px;
  font-size: 24px;
  color: #999;
  cursor: pointer;
  background: none;
  border: none;
  line-height:1;
}
.modal-close:hover { color:#333; }
.modal-img { width:100%; max-height:360px; object-fit:contain; background:#f5f5f5; border-radius:6px; margin-bottom:12px; }
.modal-title { font-size:18px; font-weight:700; color:#1a1a2e; margin-bottom:4px; }
.modal-meta { font-size:13px; color:#888; margin-bottom:12px; }
.modal-desc { font-size:14px; color:#444; line-height:1.7; }
.modal-open-btn {
  display: inline-block;
  margin-top: 16px;
  padding: 10px 28px;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
  transition: background .2s;
}
.modal-open-btn:hover { background: #d63851; }

@media (max-width: 600px) {
  .header { padding: 32px 16px 24px; }
  .header h1 { font-size:24px; }
  .grid, .exhibition-grid { grid-template-columns: 1fr; padding: 12px; gap: 12px; }
  .card-img, .exhibition-card .card-img { height: 160px; }
  .album-grid { grid-template-columns: 1fr; padding: 12px; }
  .album-img { height: 160px; }
  .modal { padding: 16px; }
  .nav-btn { padding: 8px 16px; font-size: 13px; }
}
</style>
</head>

function renderProjects() {
  var grid = document.getElementById('grid');
  grid.innerHTML = PROJECTS.map(function(p) {
    var desc = p.preview ? p.preview.substring(0,120).replace(/\n/g,' ') + '...' : '';
    return '<div class="card" onclick="openModal(' + p.id + ')">' +
      '<img class="card-img" src="' + p.thumb + '" alt="' + p.title + '" loading="lazy">' +
      '<div class="card-body">' +
        '<div class="card-title">' + p.title + '</div>' +
        '<div class="card-meta"><span>📄 ' + p.pages + ' 页</span><span>💾 ' + p.size + ' MB</span></div>' +
        '<div class="card-desc">' + desc + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderAlbums() {
  var grid = document.getElementById('albumGrid');
  grid.innerHTML = ALBUMS.map(function(a) {
    var imgHtml = a.thumb ? '<img class="album-img" src="' + a.thumb + '" alt="' + a.name + '" loading="lazy">' : '<div class="album-placeholder">📷</div>';
    var viewsHtml = a.views ? '<span>👁 ' + a.views + '</span>' : '';
    return '<a class="album-card" href="' + a.url + '" target="_blank" rel="noopener">' +
      imgHtml +
      '<div class="album-body">' +
        '<div class="album-name">' + a.name + '</div>' +
        '<div class="album-meta"><span>📱 ' + a.platform + '</span>' + viewsHtml + '</div>' +
      '</div>' +
    '</a>';
  }).join('');
}

      '</div>' +
    '</div>';
  }).join('');
}

function openExhibitionModal(id) {
  var e = EXHIBITIONS.find(function(x) { return x.id === id; });
  if (!e) return;
  document.getElementById('modalImg').src = e.thumb;
  document.getElementById('modalTitle').textContent = e.title;
  document.getElementById('modalMeta').textContent = '📄 ' + e.pages + ' 页 \u00b7 💾 ' + e.size + ' MB';
  document.getElementById('modalDesc').innerHTML = '<p>' + e.preview.replace(/\n/g,'<br>') + '</p>';
  document.getElementById('modalOpenBtn').href = encodeURI(e.file);
  document.getElementById('modalOpenBtn').style.display = e.file ? '' : 'none';
  document.getElementById('modal').classList.add('show');
}

function switchTab(tab) {
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.nav-btn[data-tab="' + tab + '"]').classList.add('active');
  document.getElementById('grid').style.display = 'none';
  document.getElementById('albumGrid').style.display = 'none';
  document.getElementById('exhibitionGrid').style.display = 'none';
  var stats = document.getElementById('stats');
  if (tab === 'projects') {
    document.getElementById('grid').style.display = '';
    stats.textContent = '\u5171 ' + PROJECTS.length + ' \u4e2a\u9879\u76ee';
    renderProjects();
  } else if (tab === 'albums') {
    document.getElementById('albumGrid').style.display = '';
    stats.textContent = ALBUMS.length + ' \u4e2a\u76f4\u64ad\u76f8\u518c';
    renderAlbums();
  } else {
    document.getElementById('exhibitionGrid').style.display = '';
    stats.textContent = EXHIBITIONS.length + ' \u4e2a\u5c55\u5385\u5efa\u8bbe\u9879\u76ee';
    renderExhibitions();
  }
}

function openModal(id) {
  var p = PROJECTS.find(function(x) { return x.id === id; });
  if (!p) return;
  document.getElementById('modalImg').src = p.thumb;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalMeta').textContent = '📄 ' + p.pages + ' 页 \u00b7 💾 ' + p.size + ' MB';
  document.getElementById('modalDesc').innerHTML = '<p><strong>\u6587\u4ef6\uff1a</strong>' + p.file + '</p>' + (p.preview ? '<p style="margin-top:8px;">' + p.preview.substring(0,300).replace(/\n/g,'<br>') + '</p>' : '');
  document.getElementById('modalOpenBtn').href = encodeURI(p.file);
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

document.querySelectorAll('.nav-btn').forEach(function(btn) {
  btn.addEventListener('click', function() { switchTab(this.dataset.tab); });
});

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

renderProjects();
switchTab('exhibition');
</script>
</body>
</html>
