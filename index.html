<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卢发达 · 项目作品集</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
  background: #f5f6fa;
  color: #1a1a2e;
}
.header {
  background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  color: #fff;
  padding: 48px 24px 36px;
  text-align: center;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom:0; left:0; right:0;
  height:4px;
  background: linear-gradient(90deg,#e94560,#f5a623,#e94560);
}
.header h1 { font-size:32px; font-weight:700; letter-spacing:3px; margin-bottom:6px; }
.header .sub { font-size:15px; color:rgba(255,255,255,.7); letter-spacing:2px; }
.header .desc { font-size:14px; color:rgba(255,255,255,.6); margin-top:8px; max-width:600px; margin-left:auto; margin-right:auto; line-height:1.6; }
.filter-bar {
  display: flex; justify-content: center; gap: 8px;
  padding: 20px 16px 8px;
  flex-wrap: wrap;
  background: #fff;
  border-bottom: 1px solid #eee;
  position: sticky; top: 0; z-index: 10;
}
.filter-btn {
  padding: 6px 18px;
  border: 1px solid #ddd;
  border-radius: 20px;
  background: #fff;
  font-size: 13px;
  color: #666;
  cursor: pointer;
  transition: all .2s;
}
.filter-btn:hover { border-color: #e94560; color: #e94560; }
.filter-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
.stats {
  text-align: center;
  font-size: 13px;
  color: #999;
  padding: 8px 16px 16px;
  background: #fff;
  border-bottom: 1px solid #eee;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}
.card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  transition: transform .25s, box-shadow .25s;
  cursor: pointer;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
.card-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  background: #eef1f7;
  display: block;
}
.card-body { padding: 14px 16px 16px; }
.card-title { font-size: 15px; font-weight:600; color:#1a1a2e; margin-bottom:6px; line-height:1.4; }
.card-meta { font-size: 12px; color: #999; margin-bottom:8px; }
.card-meta span { margin-right: 12px; }
.card-desc { font-size: 12.5px; color: #666; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-badge {
  display: inline-block;
  font-size: 11px;
  padding: 1px 8px;
  border-radius: 8px;
  margin-right: 4px;
  margin-bottom: 2px;
}
.loading {
  text-align: center;
  padding: 60px;
  color: #999;
  font-size: 15px;
}
.modal-overlay {
  display: none;
  position: fixed;
  inset:0;
  background: rgba(0,0,0,.6);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 12px;
  width: 100%;
  max-width: 680px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
  position: relative;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity:0; transform:scale(.95) } to { opacity:1; transform:scale(1) } }
.modal-close {
  position: absolute;
  top: 12px; right: 16px;
  font-size: 24px;
  color: #999;
  cursor: pointer;
  background: none;
  border: none;
  line-height:1;
}
.modal-close:hover { color:#333; }
.modal-img { width:100%; max-height:360px; object-fit:contain; background:#f5f5f5; border-radius:6px; margin-bottom:12px; }
.modal-title { font-size:18px; font-weight:700; color:#1a1a2e; margin-bottom:4px; }
.modal-meta { font-size:13px; color:#888; margin-bottom:12px; }
.modal-desc { font-size:14px; color:#444; line-height:1.7; }
.modal-open-btn {
  display: inline-block;
  margin-top: 16px;
  padding: 10px 28px;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
  transition: background .2s;
}
.modal-open-btn:hover { background: #d63851; }
@media (max-width: 600px) {
  .header { padding: 32px 16px 24px; }
  .header h1 { font-size:24px; }
  .grid { grid-template-columns: 1fr; padding: 12px; gap: 12px; }
  .card-img { height: 160px; }
  .modal { padding: 16px; }
}
.cat-insurance { background:#fff0f0; color:#d4380d; }
.cat-sports { background:#f0f5ff; color:#1d39c4; }
.cat-exhibition { background:#fff7e6; color:#d46b08; }
.cat-tech { background:#f6ffed; color:#389e0d; }
.cat-album { background:#f0f5ff; color:#1d39c4; }
.album-section { text-align:center; padding:40px 24px 8px; max-width:1200px; margin:0 auto; }
.album-section h2 { font-size:22px; color:#1a1a2e; display:inline-block; padding-bottom:8px; border-bottom:3px solid #e94560; }
.album-section .sub { font-size:13px; color:#999; margin-top:6px; }
.album-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; padding:16px 24px 40px; max-width:1200px; margin:0 auto; }
.album-card { background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.08); transition:transform .25s,box-shadow .25s; text-decoration:none; color:inherit; display:block; }
.album-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.12); }
.album-img { width:100%; height:180px; object-fit:cover; background:#eef1f7; display:block; }
.album-body { padding:12px 14px 14px; }
.album-name { font-size:14px; font-weight:600; color:#1a1a2e; margin-bottom:4px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.album-meta { font-size:12px; color:#999; }
.album-meta span { margin-right:8px; }
@media (max-width:600px) { .album-grid { grid-template-columns:1fr; padding:12px; } .album-img { height:160px; } }

</style>
</head>
<body>

<div class="header">
  <h1>卢发达 · 项目作品集</h1>
  <div class="sub">项目管理 · 会议展览 · 全案策划</div>
  <div class="desc">经手项目涵盖保险金融、医疗学术、体育赛事、大型展会等多个领域，单场活动规模达千人级以上</div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="insurance">🏦 保险金融</button>
  <button class="filter-btn" data-filter="sports">🏐 体育赛事</button>
  <button class="filter-btn" data-filter="exhibition">🏛️ 展会论坛</button>
  <button class="filter-btn" data-filter="tech">🤖 科技展会</button>
</div>

<div class="stats" id="stats">加载中...</div>

<div class="grid" id="grid">
  <div class="loading">加载作品中</div>
</div>


<div class="album-section">
  <h2>📸 直播相册</h2>
  <div class="sub">活动现场图片直播 · 点击查看</div>
</div>
<div class="album-grid" id="albumGrid">
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-desc" id="modalDesc"></div>
    <a class="modal-open-btn" id="modalOpenBtn" href="#" target="_blank">📄 打开PDF文件</a>
  </div>
</div>

<script>
var PROJECTS = [{"id": 0, "title": "10月13日重庆女排见面会活动方案", "file": "10月13日重庆女排见面会活动方案（上海新康.pdf", "pages": 37, "size": 12.6, "thumb": "thumbs/00.jpg", "thumb_sm": "thumbs/00_sm.jpg", "preview": "太平洋保险\n重庆女排见面会活动策划方案\n10.13\n"}, {"id": 1, "title": "2024世界人工智能大会-投标3.0", "file": "2024世界人工智能大会-投标3.0.pdf", "pages": 124, "size": 63.4, "thumb": "thumbs/01.jpg", "thumb_sm": "thumbs/01_sm.jpg", "preview": "上海新康辉国际旅行社有限责任公司\n2024世界人工智能大会\nWORLD ARTIFICIAL INTELLIGENCE CONFERENCE\nIntelligent Manufacturing of Dgital Labor Force Creating a Forum for New Quality Productivity\n"}, {"id": 2, "title": "2024精英会策划V8-增加案例", "file": "2024精英会策划V8-增加案例.pdf", "pages": 166, "size": 56.4, "thumb": "thumbs/02.jpg", "thumb_sm": "thumbs/02_sm.jpg", "preview": "太平洋产险第四届菁英奖\n颁奖盛典策划方案\n上海新康辉国际旅行社有限责任公司\n"}, {"id": 3, "title": "CIIE(5)", "file": "CIIE(5).pdf", "pages": 110, "size": 35.2, "thumb": "thumbs/03.jpg", "thumb_sm": "thumbs/03_sm.jpg", "preview": ""}, {"id": 4, "title": "太保2024年616伙伴节需求推荐方案", "file": "太保2024年616伙伴节需求推荐方案（上海新康.pdf", "pages": 64, "size": 39.1, "thumb": "thumbs/04.jpg", "thumb_sm": "thumbs/04_sm.jpg", "preview": "太保2 0 2 4 年6 1 6 伙伴节需求\n推荐方案\n上海新康辉国际旅行社有限责任公司\n"}, {"id": 5, "title": "太保奥运健儿见面会方案0808", "file": "太保奥运健儿见面会方案0808.pdf", "pages": 122, "size": 32.5, "thumb": "thumbs/05.jpg", "thumb_sm": "thumbs/05_sm.jpg", "preview": "  太保奥运健儿见面会（厦门站）\n活动策划方案\nOLYMPIC ATHLETE MEET AND GREET EVEN\n"}, {"id": 6, "title": "太保寿险2025年IQA年会策划方案221", "file": "太保寿险2025年IQA年会策划方案221（上海新康.pdf", "pages": 179, "size": 66.9, "thumb": "thumbs/06.jpg", "thumb_sm": "thumbs/06_sm.jpg", "preview": "上海新康辉国际旅行社有限责任公司\n"}, {"id": 7, "title": "富德生命人寿客户节", "file": "富德生命人寿客户节.pdf", "pages": 62, "size": 5.5, "thumb": "thumbs/07.jpg", "thumb_sm": "thumbs/07_sm.jpg", "preview": "以心/至新\n第十六届客户节盛典活动策划\n富德生命人寿\n"}, {"id": 8, "title": "第十二届菁英会(首尔)方案", "file": "第十二届菁英会(首尔)方案.pdf", "pages": 143, "size": 34.3, "thumb": "thumbs/08.jpg", "thumb_sm": "thumbs/08_sm.jpg", "preview": "讲解人：XXX\n2025年9月16日\n顾问行销渠道2025年\n第十二届菁英会(首尔)\n策划方案\n"}];

var CATEGORIES = {
  "世界人工智能大会": "tech",
  "CIIE": "exhibition",
  "女排": "sports",
  "奥运": "sports",
  "精英会": "insurance",
  "菁英会": "insurance",
  "太保": "insurance",
  "富德生命": "insurance",
  "伙伴节": "insurance",
  "客户节": "insurance",
  "IQA": "insurance"
};

function getCategory(title, file) {
  for (var key in CATEGORIES) {
    if (title.indexOf(key) !== -1 || file.indexOf(key) !== -1) return CATEGORIES[key];
  }
  return "exhibition";
}

var CAT_LABELS = { insurance:"🏦 保险金融", sports:"🏐 体育赛事", exhibition:"🏛️ 展会论坛", tech:"🤖 科技展会" };

function render(filter) {
  var grid = document.getElementById('grid');
  var filtered = filter === 'all' ? PROJECTS : PROJECTS.filter(function(p) { return getCategory(p.title, p.file) === filter; });
  
  document.getElementById('stats').textContent = '共 ' + PROJECTS.length + ' 个项目 · 当前显示 ' + filtered.length + ' 个';
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:60px;color:#999;">暂无匹配项目</div>';
    return;
  }
  
  grid.innerHTML = filtered.map(function(p) {
    var cat = getCategory(p.title, p.file);
    var catLabel = CAT_LABELS[cat] || cat;
    return '<div class="card" onclick="openModal(' + p.id + ')">' +
      '<img class="card-img" src="' + p.thumb + '" alt="' + p.title + '" loading="lazy">' +
      '<div class="card-body">' +
        '<div class="card-title">' + p.title + '</div>' +
        '<div class="card-meta">' +
          '<span>📄 ' + p.pages + ' 页</span>' +
          '<span>💾 ' + p.size + ' MB</span>' +
          '<span class="card-badge cat-' + cat + '">' + catLabel + '</span>' +
        '</div>' +
        '<div class="card-desc">' + (p.preview ? p.preview.substring(0,120).replace(/\n/g,' ') + '...' : '') + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function openModal(id) {
  var p = PROJECTS.find(function(x) { return x.id === id; });
  if (!p) return;
  document.getElementById('modalImg').src = p.thumb;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalMeta').textContent = '📄 ' + p.pages + ' 页 · 💾 ' + p.size + ' MB';
  
  var cat = getCategory(p.title, p.file);
  var catLabel = CAT_LABELS[cat] || cat;
  document.getElementById('modalDesc').innerHTML = 
    '<p><strong>类别：</strong>' + catLabel + '</p>' +
    '<p><strong>文件：</strong>' + p.file + '</p>' +
    '<p style="margin-top:8px;">' + (p.preview ? p.preview.substring(0,300).replace(/\n/g,'<br>') : '') + '</p>';
  
  document.getElementById('modalOpenBtn').href = encodeURI(p.file);
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    this.classList.add('active');
    render(this.dataset.filter);
  });
});

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });


var ALBUMS = [
  {id:"a1", name:"盛世骉腾谱新篇 抢爆双鸿勇夺冠 — 中国太平洋人寿江苏分公司井冈山峰会暨开门红启动会", src:"alltuu", platform:"喔图", views:"", url:"https://m.alltuu.com/album/60729643c5fa97afc177e8717bb2442d?menu=live", thumb:"https://spu.alltuu.com/cover/ALBUM5885093/SHARE/4.jpg?x-oss-process=image/resize,w_400"},
  {id:"a2", name:"江苏省分公司高客法商全员培训暨启动大会", src:"alltuu", platform:"喔图", views:"", url:"https://m.alltuu.com/album/5e944678b4e25ef2f4572b3e77ef2b0a?menu=live", thumb:"https://spu.alltuu.com/cover/ALBUM5849740/SHARE/2.jpg?x-oss-process=image/resize,w_400"},
  {id:"a3", name:"上乘之选 聚力登峰 — 太平洋寿险江苏分公司绩优组织发展峰会", src:"alltuu", platform:"喔图", views:"", url:"https://m.alltuu.com/album/276d6006d13b0a849a04e0312d5497f5?menu=live", thumb:"https://spu.alltuu.com/cover/ALBUM5386330/SHARE/2.jpg?x-oss-process=image/resize,w_400"},
  {id:"a4", name:"江苏银保条线2026年首季红表彰暨五六联动启动会议", src:"alltuu", platform:"喔图", views:"14,971", url:"https://m.alltuu.com/album/22677368d043a41b202f5b6d2401b2fe/?menu=live", thumb:"https://spu.alltuu.com/cover/ALBUM7254147/SHARE/3.jpg?x-oss-process=image/resize,w_400"},
  {id:"a5", name:"江苏银保条线2026年首季红表彰（备用链接）", src:"alltuu", platform:"喔图", views:"", url:"https://m.alltuu.com/album/795162a4f81615b25b6bdbd9f9b83bfb/?menu=live", thumb:"https://spu.alltuu.com/cover/ALBUM7756877/SHARE/1.jpg?x-oss-process=image/resize,w_400"},
  {id:"a6", name:"星耀龙江 守护相随 — 太保黑龙江分公司会议", src:"yipai360", platform:"一拍即传", views:"", url:"https://www.yipai360.com/photolivepc/?orderId=202510201303024936&channel=h5", thumb:""},
  {id:"a7", name:"大师在你身边 相乐家园-成都站", src:"yipai360", platform:"一拍即传", views:"", url:"https://www.yipai360.com/photolivepc/?orderId=202408261858523839&channel=h5", thumb:""},
];


function renderAlbums() {
  var grid = document.getElementById('albumGrid');
  grid.innerHTML = ALBUMS.map(function(a) {
    var thumbHtml = a.thumb ? '<img class="album-img" src="' + a.thumb + '" alt="' + a.name + '" loading="lazy">' 
      : '<div class="album-img" style="display:flex;align-items:center;justify-content:center;color:#999;font-size:40px;background:#eef1f7;">📷</div>';
    var viewsHtml = a.views ? '<span>👁️ ' + a.views + '</span>' : '';
    return '<a class="album-card" href="' + a.url + '" target="_blank" rel="noopener">' +
      thumbHtml +
      '<div class="album-body">' +
        '<div class="album-name">' + a.name + '</div>' +
        '<div class="album-meta">' +
          '<span>📱 ' + a.platform + '</span>' +
          viewsHtml +
        '</div>' +
      '</div>' +
    '</a>';
  }).join('');
}

render('all');
renderAlbums();
</script>
</body>
</html>
