<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卢发达 · 3D时空隧道</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;overflow-x:hidden;cursor:default}
canvas{position:fixed;top:0;left:0;z-index:0}
.content{position:relative;z-index:1}
.timeline{max-width:700px;margin:0 auto;padding:120px 24px}
.timeline h1{text-align:center;font-size:clamp(32px,6vw,56px);font-weight:900;letter-spacing:2px;margin-bottom:8px;background:linear-gradient(135deg,#ff6b00,#ff9a3c,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.timeline .sub{text-align:center;font-size:13px;color:rgba(255,255,255,.3);letter-spacing:6px;margin-bottom:64px}
.item{position:relative;padding:32px 0 32px 44px;border-left:1px solid rgba(255,107,0,.2);transition:all .4s;cursor:pointer}
.item:hover{border-left-color:#ff6b00}
.item::before{content:'';position:absolute;left:-6px;top:40px;width:11px;height:11px;border-radius:50%;background:#ff6b00;box-shadow:0 0 16px rgba(255,107,0,.5);transition:all .4s}
.item:hover::before{box-shadow:0 0 28px rgba(255,107,0,.8);transform:scale(1.3)}
.item .year{font-size:11px;color:rgba(255,107,0,.5);letter-spacing:3px;margin-bottom:4px}
.item h3{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
.item .client{font-size:12px;color:rgba(255,255,255,.3);margin-bottom:8px}
.item p{font-size:13px;color:rgba(255,255,255,.2);line-height:1.6;max-width:480px}
.back{position:fixed;top:20px;left:20px;z-index:100;padding:8px 16px;border:1px solid rgba(255,255,255,.15);border-radius:6px;color:rgba(255,255,255,.5);text-decoration:none;font-size:12px;letter-spacing:1px;transition:all .3s}
.back:hover{border-color:#ff6b00;color:#ff6b00}
</style>
</head>
<body>
<a class="back" href="index.html">← 返回主页</a>
<canvas id="c"></canvas>
<div class="content">
<div class="timeline">
<h1>卢发达</h1>
<div class="sub">时空隧道 · 项目时间线</div>
<div id="tl"></div>
</div>
</div>
<script>
var items=[{y:"2025",t:"第十二届菁英会（首尔）",c:"顾问行销渠道",d:"143页全案策划，千人级海外菁英盛会"},{y:"2025",t:"IQA年会策划方案",c:"太保寿险",d:"179页方案，行业顶级荣誉年会"},{y:"2024",t:"世界人工智能大会",c:"上海新康辉",d:"投标方案，智能制造与数字劳动力主题"},{y:"2024",t:"第四届菁英奖颁奖盛典",c:"太平洋产险",d:"166页完整策划方案"},{y:"2024",t:"616伙伴节",c:"太平洋保险",d:"需求推荐方案，品牌伙伴营销"},{y:"2024",t:"奥运健儿见面会",c:"太平洋保险",d:"厦门站活动策划方案"},{y:"2024",t:"CIIE进博会策划",c:"进博会",d:"中国国际进口博览会策划方案"},{y:"2024",t:"第十六届客户节",c:"富德生命人寿",d:"以心至新 · 客户节盛典"},{y:"2023",t:"重庆女排见面会",c:"太平洋保险",d:"体育营销活动策划方案"}];
document.getElementById('tl').innerHTML=items.map(function(i){return'<div class="item"><div class="year">'+i.y+'</div><h3>'+i.t+'</h3><div class="client">'+i.c+'</div><p>'+i.d+'</p></div>'}).join('');

var c=document.getElementById('c'),ctx=c.getContext('2d'),w,h;
function resize(){w=c.width=innerWidth;h=c.height=innerHeight}resize();addEventListener('resize',resize);

var rings=[];
for(var i=0;i<60;i++){
rings.push({y:Math.random()*h*1.5-h*.25,x:w/2+(Math.random()-.5)*w*.8,r:Math.random()*200+80,o:Math.random()*.15+.03,speed:(Math.random()-.5)*.3,phase:Math.random()*Math.PI*2})
}

var scrollY=0;
document.addEventListener('scroll',function(){scrollY=pageYOffset/(document.body.scrollHeight-innerHeight)});

function draw(){
ctx.fillStyle='rgba(5,5,8,.15)';ctx.fillRect(0,0,w,h);
var sy=scrollY*200;
for(var i=0;i<rings.length;i++){
var r=rings[i];
var ey=r.y-sy;
while(ey>h+200)ey-=h*1.5;while(ey<-200)ey+=h*1.5;
var alpha=r.o*(1-Math.abs((ey-h/2)/(h/2))*.8);
if(alpha<.01)continue;
ctx.beginPath();ctx.ellipse(w/2,ey,r.r,r.r*.35,0,0,Math.PI*2);
ctx.strokeStyle='rgba(255,107,0,'+alpha.toFixed(3)+')';
ctx.lineWidth=.5;ctx.stroke();
ctx.beginPath();ctx.ellipse(w/2,ey,r.r*.7,r.r*.25,0,0,Math.PI*2);
ctx.strokeStyle='rgba(255,107,0,'+(alpha*.5).toFixed(3)+')';
ctx.stroke()
}
requestAnimationFrame(draw)
}
draw();
</script>
</body>
</html>
